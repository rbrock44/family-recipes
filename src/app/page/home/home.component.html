<div class="page-shell home-page">
  <section class="surface-card hero-panel">
    <div class="hero-copy">
      <h1>Family Recipes</h1>
      <p class="hero-subtitle">Search, scale, and cook from the family archive in seconds.</p>
      <p class="status" *ngIf="service.isFullyLoaded()">Recipes loaded. Search away.</p>
      <p class="status" *ngIf="!service.isFullyLoaded()">Loading recipes...</p>
    </div>
    <a mat-flat-button class="add-recipe-link" href="https://add-recipe.ryan-brock.com/" target="_blank">
      Add Recipe
    </a>
  </section>

  <section class="surface-card search-panel">
    <mat-form-field appearance="outline" color="white" class="search-form-field">
      <mat-label>Search recipes</mat-label>
      <input [formControl]="searchControl" data-search-input matInput type="text" placeholder="Chocolate chip, brisket, grandma...">
      <button mat-icon-button matSuffix aria-label="Search" (click)="search()">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>

    <mat-accordion class="advanced-search">
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>
            Advanced Search
          </mat-panel-title>
        </mat-expansion-panel-header>

        <div class="advanced-grid">
          <mat-checkbox [formControl]="familyControl">Hooper Family Only</mat-checkbox>

          <mat-form-field appearance="fill" class="dropdown-form-field">
            <mat-label data-dropdown-label>Category</mat-label>
            <mat-select [formControl]="categoryControl" (selectionChange)="search()">
              <mat-option *ngFor="let cat of this.categories" [value]="cat.value" data-dropdown-option>
                {{cat.name}}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </section>

  <section *ngIf="favoritesDataSource.data.length > 0" class="favorites-wrap">
    <mat-accordion class="favorites-accordion">
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>
            Favorites
          </mat-panel-title>
        </mat-expansion-panel-header>
        <app-recipe-table [dataSource]="favoritesDataSource" [removeColumns]="true"></app-recipe-table>
      </mat-expansion-panel>
    </mat-accordion>
  </section>

  <app-recipe-table [dataSource]="dataSource"></app-recipe-table>
</div>
